<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Glitch Investigator 2.0</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 640px;
            margin: 40px auto;
            line-height: 1.6;
        }
        h2 {
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 8px;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>Applied AI System | Game Glitch Investigator 2.0</h2>
<p>Describe a game issue and receive an AI-assisted diagnosis.</p>

<form method="post">
    <textarea name="glitch_report" placeholder="Describe the glitch..."></textarea><br><br>
    <button type="submit">Analyze</button>
</form>

{% if result %}
<div class="result">
    <hr>
    <p><strong>Diagnosis:</strong> {{ result.diagnosis }}</p>
    <p><strong>Explanation:</strong> {{ result.explanation }}</p>
    <p><strong>Confidence:</strong> {{ result.confidence }}</p>
    <p><strong>Reasoning:</strong> {{ result.reasoning_summary }}</p>
</div>
{% endif %}

</body>
</html>
